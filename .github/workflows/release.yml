name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release macOS App
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Developer ID certificate
      env:
        DEVELOPER_CERT_BASE64: ${{ secrets.DEVELOPER_CERT_BASE64 }}
        DEVELOPER_CERT_PASSWORD: ${{ secrets.DEVELOPER_CERT_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        CERT_PATH=$RUNNER_TEMP/certificate.p12
        echo -n "$DEVELOPER_CERT_BASE64" | base64 -D > "$CERT_PATH"

        if [ ! -s "$CERT_PATH" ]; then
          echo "❌ Error: Failed to decode certificate (empty file)"
          exit 1
        fi
        echo "Certificate file size: $(wc -c < "$CERT_PATH") bytes"

        CERT_SIZE=$(wc -c < "$CERT_PATH")
        if [ "$CERT_SIZE" -lt 2000 ]; then
          echo "⚠️  Warning: .p12 is only $CERT_SIZE bytes — it may not contain a private key."
        fi

        security import "$CERT_PATH" \
          -P "$DEVELOPER_CERT_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/security \
          -f pkcs12 \
          -k "$KEYCHAIN_PATH"

        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s -k "$KEYCHAIN_PASSWORD" \
          "$KEYCHAIN_PATH"

        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
        echo "✅ Developer ID certificate installed"

    - name: Get version from tag
      id: get_version
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="0.0.0-${GITHUB_SHA::8}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build app
      run: |
        xcodebuild -project AppLauncher.xcodeproj \
          -scheme AppLauncher \
          -configuration Release \
          -derivedDataPath build \
          -arch arm64 \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          build

        echo "✅ Build completed successfully"

    - name: Code sign with Developer ID
      run: |
        APP_PATH="build/Build/Products/Release/AppLauncher.app"

        IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')

        if [ -z "$IDENTITY" ]; then
          echo "❌ Error: Developer ID Application certificate not found"
          exit 1
        fi

        echo "Signing with: $IDENTITY"

        codesign --force --deep --options runtime \
          --sign "$IDENTITY" \
          --keychain "$KEYCHAIN_PATH" \
          "${APP_PATH}"

        codesign --verify --verbose=2 "${APP_PATH}"
        echo "✅ Code signing complete"

    - name: Notarize app
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        APP_PATH="build/Build/Products/Release/AppLauncher.app"

        ditto -c -k --keepParent "${APP_PATH}" build/notarize.zip

        xcrun notarytool submit build/notarize.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

        xcrun stapler staple "${APP_PATH}"
        rm build/notarize.zip

        echo "✅ Notarization complete"

    - name: Create DMG
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        DMG_NAME="AppLauncher-${VERSION}.dmg"
        APP_PATH="build/Build/Products/Release/AppLauncher.app"

        mkdir -p dmg_temp
        cp -R "${APP_PATH}" dmg_temp/
        ln -s /Applications dmg_temp/Applications

        hdiutil create -volname "AppLauncher" \
          -srcfolder dmg_temp \
          -ov \
          -format UDZO \
          "build/${DMG_NAME}"

        rm -rf dmg_temp

        echo "✅ DMG created: ${DMG_NAME}"
        echo "DMG_PATH=build/${DMG_NAME}" >> $GITHUB_ENV
        echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV

    - name: Create ZIP archive
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        ZIP_NAME="AppLauncher-${VERSION}.zip"

        cd build/Build/Products/Release
        zip -r "../../../../build/${ZIP_NAME}" AppLauncher.app
        cd ../../../..

        echo "✅ ZIP created: ${ZIP_NAME}"
        echo "ZIP_PATH=build/${ZIP_NAME}" >> $GITHUB_ENV
        echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

    - name: Generate checksums
      run: |
        cd build
        shasum -a 256 *.dmg *.zip > SHA256SUMS.txt
        cat SHA256SUMS.txt
        cd ..

    - name: Clean up keychain
      if: always()
      run: |
        if [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH"
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref_type == 'tag'
      with:
        files: |
          ${{ env.DMG_PATH }}
          ${{ env.ZIP_PATH }}
          build/SHA256SUMS.txt
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Installation

          ### Option 1: DMG (Recommended)
          1. Download `${{ env.DMG_NAME }}`
          2. Open the DMG file
          3. Drag AppLauncher to your Applications folder
          4. Eject the DMG
          5. Open AppLauncher from Applications

          ### Option 2: ZIP
          1. Download `${{ env.ZIP_NAME }}`
          2. Extract the ZIP file
          3. Move AppLauncher.app to your Applications folder
          4. Open AppLauncher from Applications

          ### Required Permissions

          - **Accessibility**: Required for the global hotkey (⌥A)

          Grant this in System Settings → Privacy & Security → Accessibility.

          ---

          **Checksums**: See `SHA256SUMS.txt` for file verification
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
